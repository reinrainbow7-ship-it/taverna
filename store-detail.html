<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taverna</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* ─── 戻るボタン ─── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: none; cursor: pointer;
      color: var(--sub); font-size: 14px;
      padding: 6px 0; transition: color .15s;
    }
    .back-btn:hover { color: var(--accent); }

    /* ─── お店情報ヘッダー ─── */
    .store-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin: 24px 0;
      box-shadow: var(--shadow);
    }
    .store-header-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px;
      margin-bottom: 14px;
    }
    .store-title { font-size: 22px; font-weight: 700; }
    .store-tags { display: flex; flex-wrap: wrap; gap: 8px; }

    /* ─── セクション ─── */
    .section-title {
      font-size: 15px; font-weight: 700;
      margin-bottom: 14px;
      display: flex; align-items: center;
      justify-content: space-between;
    }

    /* ─── 訪問カード ─── */
    .visit-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex; align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
    }
    .visit-card-left { display: flex; flex-direction: column; gap: 6px; }
    .visit-card-top { display: flex; align-items: center; gap: 16px; }
    .visit-date { font-size: 14px; font-weight: 600; color: var(--text); }
    .visit-rating { display: flex; gap: 2px; }
    .star { font-size: 16px; color: #ddd; }
    .star.filled { color: #f5a623; }

    .visit-delete-btn {
      background: none; border: none; cursor: pointer;
      color: var(--sub); padding: 4px; border-radius: 6px;
      transition: color .15s;
    }
    .visit-delete-btn:hover { color: #c0392b; }

    .visit-memo {
      font-size: 13px; color: var(--sub);
      margin-top: 6px; line-height: 1.5;
      white-space: pre-wrap; word-break: break-all;
    }

    .visit-empty {
      text-align: center; padding: 40px 20px;
      color: var(--sub); font-size: 14px;
    }

    /* ─── メニューカード ─── */
    .menu-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      flex-wrap: nowrap;
    }
    .menu-card-main { flex: 1; min-width: 0; }
    .menu-name { font-size: 15px; font-weight: 600; }
    .menu-price {
      font-size: 13px; color: var(--accent);
      font-weight: 600; margin-top: 4px;
    }
    .menu-memo {
      font-size: 13px; color: var(--sub);
      margin-top: 6px; line-height: 1.5;
      white-space: pre-wrap; word-break: break-all;
    }
    /* ─── メニューカードのボタン群 ─── */
    .menu-card-btns {
      display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
    }
    .menu-edit-btn, .menu-delete-btn {
      background: none; border: none; cursor: pointer;
      color: var(--sub); padding: 4px; border-radius: 6px;
      transition: color .15s;
    }
    .menu-edit-btn:hover  { color: var(--accent); }
    .menu-delete-btn:hover { color: #c0392b; }

    /* ─── おすすめ度 ─── */
    .menu-recommend {
      display: flex; align-items: center; gap: 4px;
      margin-top: 8px; font-size: 13px; color: var(--sub);
    }
    .menu-recommend-label { margin-right: 2px; }

    /* ─── 注文回数 ─── */
    .menu-order-row {
      display: flex; align-items: center; gap: 6px;
      margin-top: 6px; font-size: 13px; color: var(--sub);
    }
    .menu-order-label { margin-right: 2px; }
    .order-count-btn {
      width: 24px; height: 24px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, color .15s; line-height: 1;
    }
    .order-count-btn:hover { border-color: var(--accent); color: var(--accent); }
    .order-count-num { font-weight: 600; min-width: 28px; text-align: center; color: var(--text); }

    /* ─── メニュー写真 ─── */
    .menu-photo-wrap {
      width: 90px; height: 90px; flex-shrink: 0;
      border-radius: 8px; overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .menu-photo {
      width: 100%; height: 100%; object-fit: cover;
      transition: opacity .15s;
    }
    .menu-photo:hover { opacity: .85; }
    .btn-set-thumbnail {
      margin-top: 8px;
      background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 8px;
      font-size: 12px; color: var(--sub);
      cursor: pointer; transition: color .15s, border-color .15s;
    }
    .btn-set-thumbnail:hover { color: var(--accent); border-color: var(--accent); }

    /* ─── 写真拡大オーバーレイ ─── */
    .photo-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.85);
      display: none; align-items: center; justify-content: center;
      z-index: 200; cursor: pointer;
    }
    .photo-overlay.open { display: flex; }
    .photo-overlay img {
      max-width: 92vw; max-height: 88vh;
      border-radius: 10px; object-fit: contain;
    }

    .menu-empty {
      text-align: center; padding: 40px 20px;
      color: var(--sub); font-size: 14px;
    }

    /* ─── 訪問モーダル ─── */
    .star-input-row {
      display: flex; gap: 8px; margin-top: 4px;
    }
    .star-input {
      font-size: 28px; cursor: pointer;
      background: none; border: none;
      color: #ddd; line-height: 1;
      transition: color .1s, transform .1s;
      padding: 0;
    }
    .star-input.active { color: #f5a623; }
    .star-input:hover { transform: scale(1.2); }

    /* ─── メモセクション ─── */
    .memo-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin: 16px 0 28px;
      box-shadow: var(--shadow);
    }
    .memo-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      resize: vertical;
      outline: none;
      transition: border .15s;
      box-sizing: border-box;
      line-height: 1.6;
    }
    .memo-textarea:focus { border-color: var(--accent); }
    .memo-save-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header>
  <div class="logo">Taverna <span>お気に入りのお店を記録する</span></div>
  <button class="btn-ghost" onclick="logout()" style="font-size:13px;">ログアウト</button>
</header>

<main>
  <!-- 戻るボタン -->
  <a class="back-btn" href="index.html">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    一覧に戻る
  </a>

  <!-- お店情報 -->
  <div class="store-header" id="store-header">
    <!-- JS で描画 -->
  </div>

  <!-- 訪問ログセクション -->
  <div class="section-title">
    <span>訪問ログ</span>
    <button class="btn-primary" onclick="openVisitModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      訪問を記録する
    </button>
  </div>

  <div id="visit-list">
    <!-- JS で描画 -->
  </div>

  <!-- メニュー記録セクション -->
  <div class="section-title" style="margin-top: 36px;">
    <span>メニュー記録</span>
    <button class="btn-primary" onclick="openMenuModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      メニューを追加
    </button>
  </div>

  <div id="menu-list">
    <!-- JS で描画 -->
  </div>

  <!-- メモセクション -->
  <div class="memo-section" style="margin-top: 36px;">
    <div class="section-title" style="margin-bottom: 10px;">
      <span>メモ</span>
    </div>
    <textarea
      id="store-memo"
      class="memo-textarea"
      rows="4"
      placeholder="気になったことをメモしよう！"
    ></textarea>
    <div class="memo-save-row">
      <button class="btn-primary" onclick="saveMemo()">保存する</button>
    </div>
  </div>
</main>

<!-- 訪問記録モーダル -->
<div class="overlay" id="visit-overlay" onclick="handleVisitOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">
      <span>訪問を記録する</span>
      <button class="modal-close" onclick="closeVisitModal()">✕</button>
    </div>

    <form id="visitForm" onsubmit="handleVisitSubmit(event)">
      <div class="form-group">
        <label>来店日 <span class="req">*</span></label>
        <input type="date" id="v-date" required />
      </div>

      <div class="form-group">
        <label>評価 <span class="req">*</span></label>
        <div class="star-input-row" id="star-input-row">
          <button type="button" class="star-input" data-value="1" onclick="setRating(1)">☆</button>
          <button type="button" class="star-input" data-value="2" onclick="setRating(2)">☆</button>
          <button type="button" class="star-input" data-value="3" onclick="setRating(3)">☆</button>
          <button type="button" class="star-input" data-value="4" onclick="setRating(4)">☆</button>
          <button type="button" class="star-input" data-value="5" onclick="setRating(5)">☆</button>
        </div>
      </div>

      <div class="form-group">
        <label>メモ <span class="opt">任意</span></label>
        <textarea id="v-memo" rows="3" placeholder="例：混んでたけど料理は最高だった！"></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-ghost" onclick="closeVisitModal()">キャンセル</button>
        <button type="submit" class="btn-primary">記録する</button>
      </div>
    </form>
  </div>
</div>

<!-- メニュー追加モーダル -->
<div class="overlay" id="menu-overlay" onclick="handleMenuOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">
      <span>メニューを追加</span>
      <button class="modal-close" onclick="closeMenuModal()">✕</button>
    </div>

    <form id="menuForm" onsubmit="handleMenuSubmit(event)">
      <div class="form-group">
        <label>メニュー名 <span class="req">*</span></label>
        <input type="text" id="m-name" placeholder="例：塩ラーメン" required />
      </div>

      <div class="form-group">
        <label>価格 <span class="opt">任意</span></label>
        <input type="number" id="m-price" placeholder="例：900" min="0" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;background:var(--surface);transition:border .15s;" />
      </div>

      <div class="form-group">
        <label>メモ <span class="opt">任意</span></label>
        <textarea id="m-memo" rows="3" placeholder="例：スープが濃くておいしい。辛さ増し無料。"></textarea>
      </div>

      <div class="form-group">
        <label>写真 <span class="opt">任意</span></label>
        <input type="file" id="m-photo" accept="image/*" style="font-size:14px;" />
      </div>

      <div class="form-actions">
        <button type="button" class="btn-ghost" onclick="closeMenuModal()">キャンセル</button>
        <button type="submit" class="btn-primary">追加する</button>
      </div>
    </form>
  </div>
</div>

<!-- お店編集モーダル -->
<div class="overlay" id="edit-overlay" onclick="handleEditOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">
      <span>お店を編集する</span>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>

    <form id="editStoreForm" onsubmit="handleEditSubmit(event)">
      <div class="form-group">
        <label>店名 <span class="req">*</span></label>
        <input type="text" id="e-name" placeholder="例: ビストロ タヴェルナ" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>場所 <span class="req">*</span></label>
          <input type="text" id="e-area" placeholder="例: 渋谷" required />
        </div>
        <div class="form-group">
          <label>駐車場</label>
          <select id="e-parking">
            <option value="">未設定</option>
            <option value="あり">あり</option>
            <option value="なし">なし</option>
            <option value="近隣にあり">近隣にあり</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>公式SNS <span class="opt">任意</span></label>
        <input type="url" id="e-sns" placeholder="https://instagram.com/…" />
      </div>

      <div class="form-group">
        <label>タグ <span class="opt">任意</span></label>
        <div class="tag-preset-list" id="e-tagPresets"></div>
        <div class="tag-custom-input">
          <input type="text" id="e-customTagInput" placeholder="カスタムタグを追加…"
                 onkeydown="if(event.key==='Enter'){event.preventDefault();addEditCustomTag()}" />
          <button type="button" class="btn-tag-add" onclick="addEditCustomTag()">追加</button>
        </div>
        <div class="tag-selected-list" id="e-tagSelected"></div>
      </div>

      <div class="form-group">
        <label>場所をピンで設定 <span class="opt">任意</span></label>
        <div class="map-picker-wrap">
          <div class="map-picker-hint">地図をクリックするとピンが立ちます</div>
          <div id="edit-pin-map"></div>
          <div class="pin-coords" id="edit-pin-coords"></div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-ghost" onclick="closeEditModal()">キャンセル</button>
        <button type="submit" class="btn-primary">更新する</button>
      </div>
    </form>
  </div>
</div>

<!-- メニュー編集モーダル -->
<div class="overlay" id="menu-edit-overlay" onclick="handleMenuEditOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">
      <span>メニューを編集</span>
      <button class="modal-close" onclick="closeMenuEditModal()">✕</button>
    </div>

    <form id="menuEditForm" onsubmit="handleMenuEditSubmit(event)">
      <div class="form-group">
        <label>メニュー名 <span class="req">*</span></label>
        <input type="text" id="me-name" placeholder="例：塩ラーメン" required />
      </div>

      <div class="form-group">
        <label>価格 <span class="opt">任意</span></label>
        <input type="number" id="me-price" placeholder="例：900" min="0" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;background:var(--surface);transition:border .15s;" />
      </div>

      <div class="form-group">
        <label>メモ <span class="opt">任意</span></label>
        <textarea id="me-memo" rows="3" placeholder="例：スープが濃くておいしい。辛さ増し無料。"></textarea>
      </div>

      <div class="form-group">
        <label>おすすめ度 <span class="opt">任意</span></label>
        <div class="star-input-row" id="me-star-row">
          <button type="button" class="star-input" data-value="1" onclick="setMenuEditRating(1)">☆</button>
          <button type="button" class="star-input" data-value="2" onclick="setMenuEditRating(2)">☆</button>
          <button type="button" class="star-input" data-value="3" onclick="setMenuEditRating(3)">☆</button>
          <button type="button" class="star-input" data-value="4" onclick="setMenuEditRating(4)">☆</button>
          <button type="button" class="star-input" data-value="5" onclick="setMenuEditRating(5)">☆</button>
        </div>
      </div>

      <div class="form-group">
        <label>写真 <span class="opt">任意</span></label>
        <div id="me-photo-preview" style="margin-bottom:8px;"></div>
        <input type="file" id="me-photo" accept="image/*" style="font-size:14px;" />
        <div style="font-size:12px;color:var(--sub);margin-top:4px;">ファイルを選択すると写真が変更されます</div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-ghost" onclick="closeMenuEditModal()">キャンセル</button>
        <button type="submit" class="btn-primary">更新する</button>
      </div>
    </form>
  </div>
</div>

<!-- 写真拡大オーバーレイ -->
<div class="photo-overlay" id="photo-overlay" onclick="closePhotoModal()">
  <img id="photo-modal-img" src="" alt="写真" />
</div>

<!-- 地図表示モーダル -->
<div class="map-overlay" id="map-overlay" onclick="handleMapOverlayClick(event)">
  <div class="map-modal">
    <div class="map-modal-header">
      <span id="map-modal-title"></span>
      <button onclick="closeMapModal()">✕</button>
    </div>
    <div id="view-map"></div>
    <div class="map-no-location" id="map-no-location" style="display:none;">
      <span>🗺️</span>
      <p>まだ場所が登録されていません。<br>編集からピンを設定してください。</p>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/utils.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/map.js"></script>
<script src="js/visits.js"></script>
<script src="js/menu.js"></script>
<script>
  // ─── 現在のお店データをキャッシュ（地図ボタン用）───
  let _currentStore = null;

  function openCurrentStoreMap() {
    if (_currentStore) openMapModal(_currentStore);
  }

  // ─── お店情報を描画（Supabase版）───
  async function renderStoreHeader() {
    const { data: store, error } = await db
      .from('stores')
      .select('*')
      .eq('id', currentStoreId)
      .single();

    if (error || !store) {
      document.getElementById('store-header').innerHTML =
        '<p style="color:var(--sub)">お店が見つかりませんでした。</p>';
      return;
    }

    _currentStore = store; // キャッシュに保存
    document.title = `${store.name} - Taverna`;

    document.getElementById('store-header').innerHTML = `
      <div class="store-header-top">
        <div class="store-title">${esc(store.name)}</div>
        <div style="display:flex;gap:8px;flex-shrink:0;">
          <button class="card-map-btn" onclick="openCurrentStoreMap()">
            📍 おみせはここ！
          </button>
          <button class="btn-primary" onclick="openEditModal()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            編集
          </button>
        </div>
      </div>
      <div class="store-tags">
        <span class="card-tag">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          ${esc(store.area)}
        </span>
        ${store.parking ? `<span class="card-tag">🅿 ${esc(store.parking)}</span>` : ''}
        ${store.sns ? `
          <a href="${esc(store.sns)}" target="_blank" rel="noopener"
             style="font-size:12px; color:var(--accent); text-decoration:none;">
            🔗 ${esc(store.sns.replace(/^https?:\/\/(www\.)?/, ''))}
          </a>` : ''}
      </div>
      ${(store.tags || []).length > 0 ? `
      <div class="store-tags" style="margin-top:12px;">
        ${store.tags.map(t => `<span class="store-tag-chip">${esc(t)}</span>`).join('')}
      </div>` : ''}
    `;
  }

  function handleVisitOverlayClick(e) {
    if (e.target === document.getElementById('visit-overlay')) closeVisitModal();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeVisitModal(); closeMenuModal(); closeMenuEditModal(); closeEditModal(); closePhotoModal(); closeMapModal(); }
  });

  // ─── お店編集モーダル ───
  const PRESET_TAGS = ['ラーメン', 'カフェ', '海鮮', '焼肉', 'カレー', '居酒屋', 'スイーツ', 'テイクアウト可'];
  let editSelectedTags = [];

  async function openEditModal() {
    const { data: store, error } = await db
      .from('stores')
      .select('*')
      .eq('id', currentStoreId)
      .single();
    if (error || !store) return;

    editSelectedTags = store.tags ? [...store.tags] : [];
    document.getElementById('e-name').value    = store.name    || '';
    document.getElementById('e-area').value    = store.area    || '';
    document.getElementById('e-parking').value = store.parking || '';
    document.getElementById('e-sns').value     = store.sns     || '';

    renderEditTagSelector();
    document.getElementById('edit-overlay').classList.add('open');

    // ピン設置マップを初期化（既存の座標があればセット）
    setTimeout(() => {
      document.getElementById('e-name').focus();
      initPinMap('edit-pin-map', 'edit-pin-coords');
      if (store.latitude && store.longitude) {
        setPinLocation('edit-pin-map', 'edit-pin-coords', store.latitude, store.longitude);
      }
    }, 250);
  }

  function closeEditModal() {
    document.getElementById('edit-overlay').classList.remove('open');
    document.getElementById('editStoreForm').reset();
    editSelectedTags = [];
    destroyPinMap('edit-pin-map');
  }

  function handleEditOverlayClick(e) {
    if (e.target === document.getElementById('edit-overlay')) closeEditModal();
  }

  function renderEditTagSelector() {
    document.getElementById('e-tagPresets').innerHTML = PRESET_TAGS.map((t, i) =>
      `<button type="button" class="tag-preset-chip${editSelectedTags.includes(t) ? ' selected' : ''}" onclick="toggleEditPresetTag(${i})">${esc(t)}</button>`
    ).join('');

    document.getElementById('e-tagSelected').innerHTML = editSelectedTags.map((t, i) =>
      `<span class="tag-selected-chip">${esc(t)}<button type="button" onclick="removeEditSelectedTag(${i})">×</button></span>`
    ).join('');
  }

  function toggleEditPresetTag(index) {
    const tag = PRESET_TAGS[index];
    editSelectedTags = editSelectedTags.includes(tag)
      ? editSelectedTags.filter(t => t !== tag)
      : [...editSelectedTags, tag];
    renderEditTagSelector();
  }

  function removeEditSelectedTag(index) {
    editSelectedTags.splice(index, 1);
    renderEditTagSelector();
  }

  function addEditCustomTag() {
    const input = document.getElementById('e-customTagInput');
    const tag   = input.value.trim();
    if (!tag) return;
    if (!editSelectedTags.includes(tag)) editSelectedTags.push(tag);
    input.value = '';
    renderEditTagSelector();
  }

  async function handleEditSubmit(e) {
    e.preventDefault();
    const { lat, lng } = getPinLatLng('edit-pin-map');
    const data = {
      name:      document.getElementById('e-name').value.trim(),
      area:      document.getElementById('e-area').value.trim(),
      parking:   document.getElementById('e-parking').value,
      sns:       document.getElementById('e-sns').value.trim(),
      tags:      [...editSelectedTags],
      latitude:  lat,
      longitude: lng,
    };
    const { error } = await db.from('stores').update(data).eq('id', currentStoreId);
    if (error) { showToast('エラーが発生しました'); return; }
    closeEditModal();
    showToast('お店情報を更新しました');
    renderStoreHeader();
  }

  // ─── メモ（Supabase版）───
  async function loadMemo() {
    const { data } = await db
      .from('stores')
      .select('memo')
      .eq('id', currentStoreId)
      .single();
    if (data?.memo) {
      document.getElementById('store-memo').value = data.memo;
    }
  }

  async function saveMemo() {
    const memo = document.getElementById('store-memo').value;
    const { error } = await db
      .from('stores')
      .update({ memo })
      .eq('id', currentStoreId);
    if (error) { showToast('エラーが発生しました'); return; }
    showToast('メモを保存しました');
  }

  // ─── 初期化 ───
  checkAuth().then(() => {
    renderStoreHeader();
    renderVisitList();
    renderMenuList();
    loadMemo();
  });
</script>

</body>
</html>
