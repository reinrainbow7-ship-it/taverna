<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taverna</title>
  <style>
    /* ─── リセット & ベース ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f7f4ef;
      --surface:   #ffffff;
      --border:    #e8e2d9;
      --accent:    #c8522a;
      --accent-h:  #a83f1e;
      --text:      #2c2417;
      --sub:       #7a6f62;
      --tag-bg:    #f0e9df;
      --shadow:    0 2px 12px rgba(0,0,0,.08);
      --radius:    14px;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── ヘッダー ─── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--accent);
    }
    .logo span { color: var(--text); font-weight: 400; font-size: 12px; margin-left: 8px; }

    /* ─── メインレイアウト ─── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    /* ─── ツールバー ─── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .store-count { font-size: 14px; color: var(--sub); }
    .store-count strong { color: var(--text); }

    /* ─── 検索 ─── */
    .search-wrap { position: relative; flex: 1; max-width: 320px; }
    .search-wrap svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--sub); pointer-events: none;
    }
    input[type="search"] {
      width: 100%; padding: 9px 12px 9px 36px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface); font-size: 14px; outline: none;
      transition: border .15s;
    }
    input[type="search"]:focus { border-color: var(--accent); }

    /* ─── ボタン ─── */
    .btn-primary {
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      padding: 9px 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn-primary:hover { background: var(--accent-h); }

    .btn-ghost {
      background: transparent; color: var(--sub);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 16px; font-size: 13px; cursor: pointer;
      transition: all .15s;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── カードグリッド ─── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    /* ─── 店カード ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      transition: transform .15s, box-shadow .15s;
      cursor: pointer;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }

    .card-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-name { font-size: 17px; font-weight: 700; line-height: 1.3; }
    .card-menu-btn {
      background: none; border: none; cursor: pointer;
      color: var(--sub); padding: 2px; border-radius: 6px;
      transition: color .15s;
    }
    .card-menu-btn:hover { color: var(--accent); }

    .card-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--tag-bg); border-radius: 6px;
      padding: 3px 8px; font-size: 12px; color: var(--sub);
      margin-right: 6px; margin-bottom: 6px;
    }

    .card-meta { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
    .card-meta-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--sub);
    }
    .card-meta-row svg { flex-shrink: 0; }

    .card-sns {
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center;
      font-size: 12px; color: var(--sub);
    }
    .card-sns a {
      color: var(--accent); text-decoration: none;
      word-break: break-all;
    }
    .card-sns a:hover { text-decoration: underline; }

    /* ─── 空状態 ─── */
    .empty {
      grid-column: 1 / -1;
      text-align: center; padding: 80px 20px;
      color: var(--sub);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 15px; margin-bottom: 20px; }

    /* ─── モーダル ─── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      width: 100%; max-width: 480px;
      padding: 28px;
      box-shadow: 0 16px 48px rgba(0,0,0,.2);
      transform: translateY(12px);
      transition: transform .2s;
    }
    .overlay.open .modal { transform: translateY(0); }

    .modal-title {
      font-size: 18px; font-weight: 700;
      margin-bottom: 24px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--sub); font-size: 20px; line-height: 1;
      transition: color .15s;
    }
    .modal-close:hover { color: var(--text); }

    /* ─── フォーム ─── */
    .form-group { margin-bottom: 18px; }
    label {
      display: block; font-size: 13px; font-weight: 600;
      margin-bottom: 6px; color: var(--text);
    }
    label .req { color: var(--accent); margin-left: 2px; }
    label .opt { color: var(--sub); font-weight: 400; font-size: 11px; margin-left: 4px; }

    input[type="text"], input[type="url"],
    select, textarea {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: inherit; outline: none;
      background: var(--surface);
      transition: border .15s;
    }
    input[type="text"]:focus, input[type="url"]:focus,
    select:focus, textarea:focus { border-color: var(--accent); }

    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    .form-actions {
      display: flex; gap: 10px; justify-content: flex-end;
      margin-top: 8px;
    }

    /* ─── コンテキストメニュー ─── */
    .ctx-menu {
      position: fixed; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.14);
      z-index: 200; min-width: 140px;
      overflow: hidden;
      display: none;
    }
    .ctx-menu.open { display: block; }
    .ctx-item {
      padding: 10px 16px; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: background .1s;
    }
    .ctx-item:hover { background: var(--tag-bg); }
    .ctx-item.danger { color: #c0392b; }
    .ctx-item.danger:hover { background: #fdecea; }

    /* ─── トースト ─── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--text); color: #fff;
      padding: 10px 20px; border-radius: 8px; font-size: 14px;
      box-shadow: var(--shadow); z-index: 300;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header>
  <div class="logo">Taverna <span>お気に入りのお店を記録する</span></div>
</header>

<!-- メインコンテンツ -->
<main>
  <div class="toolbar">
    <div class="store-count">
      <strong id="count">0</strong> 件のお店
    </div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search" id="searchInput" placeholder="店名・エリアで検索…" oninput="renderCards()" />
    </div>
    <button class="btn-primary" onclick="openModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      お店を追加
    </button>
  </div>

  <!-- カードグリッド -->
  <div class="grid" id="grid"></div>
</main>

<!-- 追加/編集モーダル -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">お店を登録する</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <form id="storeForm" onsubmit="handleSubmit(event)">
      <input type="hidden" id="editId" />

      <div class="form-group">
        <label>店名 <span class="req">*</span></label>
        <input type="text" id="f-name" placeholder="例: ビストロ タヴェルナ" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>場所 <span class="req">*</span></label>
          <input type="text" id="f-area" placeholder="例: 渋谷" required />
        </div>
        <div class="form-group">
          <label>駐車場</label>
          <select id="f-parking">
            <option value="">未設定</option>
            <option value="あり">あり</option>
            <option value="なし">なし</option>
            <option value="近隣にあり">近隣にあり</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>公式SNS <span class="opt">任意</span></label>
        <input type="url" id="f-sns" placeholder="https://instagram.com/…" />
      </div>

      <div class="form-actions">
        <button type="button" class="btn-ghost" onclick="closeModal()">キャンセル</button>
        <button type="submit" class="btn-primary" id="submitBtn">登録する</button>
      </div>
    </form>
  </div>
</div>

<!-- コンテキストメニュー -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" onclick="editStore()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    編集
  </div>
  <div class="ctx-item danger" onclick="deleteStore()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <path d="M10 11v6M14 11v6"/>
    </svg>
    削除
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
  /* ════════════════════════════════
     データ管理（localStorage）
  ════════════════════════════════ */
  const STORAGE_KEY = 'taverna_stores';

  function loadStores() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveStores(stores) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(stores));
  }

  let stores = loadStores();

  /* ════════════════════════════════
     レンダリング
  ════════════════════════════════ */
  function renderCards() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const filtered = q
      ? stores.filter(s =>
          s.name.toLowerCase().includes(q) ||
          s.area.toLowerCase().includes(q))
      : stores;

    document.getElementById('count').textContent = stores.length;
    const grid = document.getElementById('grid');

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🍽️</div>
          <p>${q ? `"${q}" に一致するお店が見つかりません` : 'まだお店が登録されていません'}</p>
          ${!q ? `<button class="btn-primary" onclick="openModal()" style="margin:0 auto">最初のお店を追加する</button>` : ''}
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(s => `
      <div class="card" onclick="handleCardClick(event, '${s.id}')">
        <div class="card-header">
          <div class="card-name">${esc(s.name)}</div>
          <button class="card-menu-btn" onclick="openCtxMenu(event, '${s.id}')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
            </svg>
          </button>
        </div>
        <div>
          <span class="card-tag">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            ${esc(s.area)}
          </span>
          ${s.parking ? `<span class="card-tag">🅿 ${esc(s.parking)}</span>` : ''}
        </div>
        ${s.sns ? `
        <div class="card-sns">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <a href="${esc(s.sns)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
            ${esc(s.sns.replace(/^https?:\/\/(www\.)?/, ''))}
          </a>
        </div>` : ''}
      </div>
    `).join('');
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ════════════════════════════════
     モーダル
  ════════════════════════════════ */
  let editingId = null;

  function openModal(id = null) {
    editingId = id;
    const store = id ? stores.find(s => s.id === id) : null;

    document.getElementById('modalTitle').textContent = id ? 'お店を編集する' : 'お店を登録する';
    document.getElementById('submitBtn').textContent = id ? '更新する' : '登録する';
    document.getElementById('editId').value = id || '';
    document.getElementById('f-name').value = store?.name || '';
    document.getElementById('f-area').value = store?.area || '';
    document.getElementById('f-parking').value = store?.parking || '';
    document.getElementById('f-sns').value = store?.sns || '';

    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-name').focus(), 200);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('storeForm').reset();
    editingId = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  /* ════════════════════════════════
     フォーム送信
  ════════════════════════════════ */
  function handleSubmit(e) {
    e.preventDefault();
    const data = {
      name:    document.getElementById('f-name').value.trim(),
      area:    document.getElementById('f-area').value.trim(),
      parking: document.getElementById('f-parking').value,
      sns:     document.getElementById('f-sns').value.trim(),
    };

    if (editingId) {
      stores = stores.map(s => s.id === editingId ? { ...s, ...data } : s);
      showToast('お店情報を更新しました');
    } else {
      stores.push({ id: genId(), ...data, createdAt: new Date().toISOString() });
      showToast('お店を登録しました 🎉');
    }

    saveStores(stores);
    renderCards();
    closeModal();
  }

  /* ════════════════════════════════
     コンテキストメニュー
  ════════════════════════════════ */
  let ctxTargetId = null;

  function openCtxMenu(e, id) {
    e.stopPropagation();
    ctxTargetId = id;
    const menu = document.getElementById('ctxMenu');
    menu.classList.add('open');

    const x = Math.min(e.clientX, window.innerWidth - 160);
    const y = Math.min(e.clientY, window.innerHeight - 100);
    menu.style.left = x + 'px';
    menu.style.top  = y + 'px';
  }

  function closeCtxMenu() {
    document.getElementById('ctxMenu').classList.remove('open');
    ctxTargetId = null;
  }

  function editStore() {
    const id = ctxTargetId;
    closeCtxMenu();
    openModal(id);
  }

  function deleteStore() {
    if (!ctxTargetId) return;
    const store = stores.find(s => s.id === ctxTargetId);
    if (!store) return;
    if (!confirm(`「${store.name}」を削除しますか？`)) { closeCtxMenu(); return; }
    stores = stores.filter(s => s.id !== ctxTargetId);
    saveStores(stores);
    renderCards();
    closeCtxMenu();
    showToast('削除しました');
  }

  function handleCardClick(e, id) {
    // 将来: 詳細ページへ遷移
  }

  document.addEventListener('click', e => {
    if (!document.getElementById('ctxMenu').contains(e.target)) closeCtxMenu();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeCtxMenu(); }
  });

  /* ════════════════════════════════
     トースト
  ════════════════════════════════ */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  /* ─── ID生成（file://でも動作） ─── */
  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 9);
  }

  /* ────── 初期描画 ────── */
  renderCards();
</script>
</body>
</html>
